{% set name = "selenoprofiles4" %}
{% set version = environ.get("PKG_VERSION") %}

package:
  name:    {{ name }}
  version: {{ version }}

source:
  url: "https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz"


build:
  number: 0
  noarch: python
  entry_points:
    - selenoprofiles = selenoprofiles4.selenoprofiles4:main
  script: "{{ PYTHON }} -m pip install . -vv"

requirements:
  host:
    - pip
    - python >=3.12, <3.13
  run:
    - python >=3.12, <3.13
    - requests 
    # During the 4.6 transition Selenoprofiles supports both BLAST backends:
    # - blast-legacy provides blastall/psitblastn/blastpgp for the legacy path
    # - blast provides BLAST+ binaries (makeblastdb, psiblast, tblastn)
    # The legacy dependency can be removed when the old backend is retired.
    - bioconda::blast-legacy
    - bioconda::blast
    - bioconda::wise2
    - bioconda::exonerate
    - bioconda::mafft
    - biopython
    - obonet
    - gawk
    - networkx 
    - easyterm >=1.0.0

test:
  imports:
    - {{ name }}

  commands:
    - selenoprofiles -setup
    - yes "" | selenoprofiles -download || true 
    - selenoprofiles -h

about:
  home: "https://github.com/marco-mariotti/{{name}}"
  license: MIT
  license_family: MIT
  license_file: 
  summary: "https://github.com/marco-mariotti/{{name}}"
  doc_url: "https://github.com/marco-mariotti/{{name}}"
  dev_url: 

extra:
  recipe-maintainers:
    - marco-mariotti
    - maxtico
